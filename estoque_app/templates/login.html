{% extends "base.html" %}
{% block title %}Login - Estoque{% endblock %}
{% block content %}
<section class="login-card">
    <h1>Estoque J.I Montadora</h1>
    <form method="post" class="form-grid">
        <label>
            Usuario
            <input name="username" autocomplete="username" autofocus required>
        </label>
        <label>
            Senha
            <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn primary large" type="submit">Entrar</button>
    </form>
</section>
{% endblock %}
